<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varve Agency SDKs — Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #0f172a;
      color: #f8fafc;
      padding: 1.75rem 2rem;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    header p {
      margin-top: 0.3rem;
      color: #94a3b8;
      font-size: 0.85rem;
    }

    main {
      max-width: 680px;
      margin: 2rem auto;
      padding: 0 1.25rem;
    }

    .package {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .package-header {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid #f1f5f9;
    }

    .package-name {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.9rem;
      font-weight: 600;
      color: #0f172a;
    }

    .badge {
      padding: 0.2rem 0.55rem;
      border-radius: 9999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge.passing { background: #dcfce7; color: #15803d; }
    .badge.failing { background: #fee2e2; color: #b91c1c; }
    .badge.unknown { background: #f1f5f9; color: #64748b; }

    .package-meta {
      margin-left: auto;
      font-size: 0.8rem;
      color: #64748b;
      white-space: nowrap;
    }
    .package-meta a {
      color: inherit;
      text-decoration: none;
    }
    .package-meta a:hover { text-decoration: underline; }

    .sections { padding: 0.25rem 0; }

    .section-row {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.55rem 1.25rem;
      font-size: 0.85rem;
    }
    .section-row + .section-row {
      border-top: 1px solid #f8fafc;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.passing { background: #22c55e; }
    .dot.failing { background: #ef4444; }
    .dot.unknown { background: #cbd5e1; }

    .section-name { flex: 1; color: #374151; }

    .section-count {
      font-size: 0.78rem;
      color: #94a3b8;
      font-variant-numeric: tabular-nums;
    }

    .no-data {
      padding: 1.5rem 1.25rem;
      font-size: 0.85rem;
      color: #94a3b8;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Varve Agency SDKs</h1>
    <p>Live API health — tested weekly against production APIs</p>
  </header>

  <main id="app"></main>

  <footer>
    <a href="https://github.com/varve-ca/agency-sdks">varve-ca/agency-sdks</a>
    &nbsp;·&nbsp;
    <a href="https://www.npmjs.com/org/varve">npm @varve</a>
  </footer>

  <script>
    const PACKAGES = [
      { key: 'ons-api',      display: '@varve/ons-api',      npm: 'https://www.npmjs.com/package/@varve/ons-api' },
      { key: 'statcan-wds',  display: '@varve/statcan-wds',  npm: 'https://www.npmjs.com/package/@varve/statcan-wds' },
    ];

    function timeAgo(iso) {
      if (!iso) return 'never';
      const diff = Date.now() - new Date(iso).getTime();
      const mins  = Math.floor(diff / 60_000);
      const hours = Math.floor(mins  / 60);
      const days  = Math.floor(hours / 24);
      if (days  > 0) return `${days}d ago`;
      if (hours > 0) return `${hours}h ago`;
      if (mins  > 0) return `${mins}m ago`;
      return 'just now';
    }

    function sectionStatus(s) {
      return s.failed > 0 ? 'failing' : s.passed > 0 ? 'passing' : 'unknown';
    }

    function renderPackage(pkg, data) {
      const status = data?.status ?? 'unknown';
      const sections = data?.sections ?? {};
      const entries = Object.entries(sections);

      const metaHtml = data?.last_checked
        ? `<span class="package-meta">
            checked ${timeAgo(data.last_checked)}
            ${data.run_url ? ` &nbsp;·&nbsp; <a href="${data.run_url}" target="_blank">${data.passed}/${data.total} passed</a>` : ''}
           </span>`
        : '';

      const sectionsHtml = entries.length > 0
        ? `<div class="sections">${entries.map(([name, s]) => {
            const st = sectionStatus(s);
            const total = s.passed + s.failed;
            const countHtml = total > 1 ? `<span class="section-count">${s.passed}/${total}</span>` : '';
            return `<div class="section-row">
              <div class="dot ${st}"></div>
              <span class="section-name">${name}</span>
              ${countHtml}
            </div>`;
          }).join('')}</div>`
        : `<div class="no-data">No runs yet — workflows trigger every Monday.</div>`;

      return `<div class="package">
        <div class="package-header">
          <a class="package-name" href="${pkg.npm}" target="_blank">${pkg.display}</a>
          <span class="badge ${status}">${status}</span>
          ${metaHtml}
        </div>
        ${sectionsHtml}
      </div>`;
    }

    async function main() {
      let status = {};
      try {
        const res = await fetch('status.json');
        if (res.ok) status = await res.json();
      } catch {}

      document.getElementById('app').innerHTML =
        PACKAGES.map(pkg => renderPackage(pkg, status[pkg.key])).join('');
    }

    main();
  </script>
</body>
</html>
